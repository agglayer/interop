name: Skills Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  skills-check:
    name: Skills Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Verify skills match lockfile
        run: |
          node -e '
            const fs = require("fs");
            const lock = JSON.parse(fs.readFileSync("skills-lock.json", "utf-8"));
            const skills = Object.keys(lock.skills);
            let ok = true;
            for (const name of skills) {
              const dir = ".agents/skills/" + name;
              const md = dir + "/SKILL.md";
              if (!fs.existsSync(dir)) {
                console.error("Missing skill directory: " + dir);
                ok = false;
              } else if (!fs.existsSync(md)) {
                console.error("Missing SKILL.md: " + md);
                ok = false;
              } else {
                console.log("OK: " + name);
              }
            }
            if (!ok) process.exit(1);
            console.log("All " + skills.length + " skills verified.");
          '
